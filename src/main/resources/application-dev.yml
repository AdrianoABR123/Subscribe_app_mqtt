server:
  port: 8083

spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect



mqtt:
  urlBroker: tcp://localhost:1883
  client-id: ecosniff-dev
  topic: ecosniff/test
  qos: 1
  username: dev
  password: dev